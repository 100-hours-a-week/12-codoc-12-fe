name: frontend-cd

on:
  workflow_call:
    inputs:
      ref_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref_name:
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: frontend-cd
  cancel-in-progress: false

jobs:

  deploy-dev:
    if: inputs.ref_name == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./artifact

      - name: Clean release dir on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            rm -rf /home/ubuntu/frontend-release/*

      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_SSH_KEY }}
          source: "artifact/**"
          target: "/home/ubuntu/frontend-release"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/current/*
            sudo cp -r /home/ubuntu/frontend-release/* /var/www/current/

      - name: Health check dev
        run: |
          curl --fail --silent --show-error https://codoc.cloud/ > /dev/null

      - name: Notify CD result to Discord
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
            COLOR="65280"
          else
            STATUS="failure"
            COLOR="16711680"
          fi

          curl -X POST -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"[FE] CD result\",
                \"description\": \"Status: ${STATUS}\\nBranch: develop\\nTarget: https://codoc.cloud/\",
                \"color\": ${COLOR},
                \"fields\": [
                  {\"name\": \"Run\", \"value\": \"${RUN_URL}\"}
                ]
              }]
            }" \
            "${{ secrets.DISCORD_WEBHOOK }}"

  deploy-prod:
    if: inputs.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./artifact

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy to S3
        run: |
          aws s3 sync artifact/ s3://${{ secrets.FE_S3_BUCKET_PROD }} --delete

      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.FE_CF_DIST_PROD }} \
            --paths "/*"

      - name: Health check prod
        run: |
          curl --fail --silent --show-error https://dev.codoc.cloud/ > /dev/null

      - name: Notify CD result to Discord
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
            COLOR="65280"
          else
            STATUS="failure"
            COLOR="16711680"
          fi

          curl -X POST -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"[FE] CD result\",
                \"description\": \"Status: ${STATUS}\\nBranch: main\\nTarget: https://dev.codoc.cloud/\",
                \"color\": ${COLOR},
                \"fields\": [
                  {\"name\": \"Run\", \"value\": \"${RUN_URL}\"}
                ]
              }]
            }" \
            "${{ secrets.DISCORD_WEBHOOK }}"
